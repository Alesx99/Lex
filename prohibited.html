<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2;url=segreti.html">
    <title>Accesso Proibito - Lex Studiorum</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof LexCore !== 'undefined' && LexCore.unlockEasterEgg) {
                LexCore.unlockEasterEgg('ee-index-prohibitorum');
            }
            setTimeout(() => {
                window.location.replace("segreti.html");
            }, 1200);
        });
    </script>
    <style>
        body {
            background: #090604;
            color: #dcd1c4;
            font-family: 'Playfair Display', Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message-box {
            max-width: 500px;
            padding: 2.5rem;
            background: #110c08;
            border: 1px solid #3e270f;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        h1 {
            color: #cc1111;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        .spinner {
            margin: 1.5rem auto 0 auto;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(220, 209, 196, 0.1);
            border-top-color: #cc1111;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>Accesso Proibito 🏛️</h1>
        <p>Stai tentando di accedere ad una sezione riservata della biblioteca...</p>
        <p style="font-size: 0.9rem; color: #b29367;">Reindirizzamento all'Indice dei Libri Proibiti in corso.</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
